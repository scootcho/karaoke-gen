"노래 선택\",\"step1Desc\":\"검색하거나 YouTube 링크를 붙여넣거나 오디오를 업로드하세요\",\"step2Title\":\"복잡한 작업은 저희가 할게요\",\"step2Desc\":\"보컬 제거, 가사 추출 및 싱크 맞춤\",\"step3Title\":\"검토 및 수정\",\"step3Desc\":\"가사 인식 오류 수정 (보통 5-10분 소요)\",\"step4Title\":\"비디오 받기\",\"step4Desc\":\"파일을 다운로드하거나 저희 YouTube 채널에서 시청하세요\",\"tutorialTitle\":\"자세한 설명이 필요하신가요?\",\"tutorialDesc\":\"작업 생성부터 완성된 비디오 다운로드까지 모든 단계를 자세히 보여주는 전체 튜토리얼을 시청해 보세요.\",\"tutorialVideoTitle\":\"Nomad Karaoke 전체 튜토리얼\"},\"features\":{\"title\":\"제공되는 기능\",\"feature1Title\":\"실제 반주\",\"feature1Desc\":\"커버 밴드나 MIDI 재현이 아닌, 원곡의 실제 반주를 사용합니다.\",\"feature2Title\":\"정확한 가사 싱크\",\"feature2Desc\":\"노래할 타이밍을 정확히 알려주는 단어 단위의 싱크. 가사의 정확성을 직접 검토할 수 있습니다.\",\"feature3Title\":\"백보컬 유지 또는 제거\",\"feature3Desc\":\"깔끔한 반주를 선택하거나, 더 풍성한 사운드를 위해 백보컬을 유지할 수 있습니다.\",\"feature4Title\":\"4K 비디오 + 다양한 포맷\",\"feature4Desc\":\"4K 노래방 비디오, 보컬이 포함된 따라 부르기 버전, 구형 시스템을 위한 CDG+MP3를 제공합니다.\",\"feature5Title\":\"YouTube에 게시\",\"feature5Desc\":\"모든 비디오는 쉽게 공유할 수 있도록 저희 YouTube 채널에 자동으로 게시됩니다.\",\"feature6Title\":\"내보내기 전 완벽한 제어\",\"feature6Desc\":\"최종 비디오가 생성되기 전에 가사 인식 오류를 검토하고 수정할 수 있습니다.\",\"feature7Badge\":\"NEW\",\"feature7Desc\":\"듀엣을 부르시나요? 검토 단계에서 각 파트를 부를 사람에게 지정해 보세요. 완성된 영상에서는 누가 어떤 파트를 부르는지 색상으로 구분됩니다. 가수 1은 파란색, 가수 2는 분홍색, 함께 부르는 파트는 노란색으로 표시됩니다.\",\"feature7Title\":\"듀엣 및 멀티 싱어 모드\"},\"screenshots\":{\"title\":\"작동 방식 보기\",\"subtitle\":\"각 단계별 진행 과정은 다음과 같습니다\",\"jobCreationAlt\":\"아티스트 및 제목 입력이 포함된 안내형 작업 생성 흐름\",\"jobCreationTitle\":\"비디오 만들기\",\"jobCreationDesc\":\"어떤 노래든 입력하면 최상의 오디오를 자동으로 찾습니다\",\"lyricsReviewAlt\":\"수정을 위해 참조 가사와 함께 싱크된 가사 검토\",\"lyricsReviewTitle\":\"가사 검토\",\"lyricsReviewDesc\":\"싱크된 가사를 참조 가사와 비교하고 오류를 수정하세요\",\"instrumentalReviewAlt\":\"파형 시각화 및 백보컬 옵션이 포함된 반주 검토\",\"instrumentalReviewTitle\":\"반주 선택\",\"instrumentalReviewDesc\":\"오디오 옵션을 들어보고 가장 좋은 반주 트랙을 선택하세요\",\"exampleOutputAlt\":\"4K, 720p, CDG 등의 다운로드 옵션이 포함된 완료된 노래방 작업\",\"exampleOutputTitle\":\"다운로드 및 공유\",\"exampleOutputDesc\":\"몇 분 만에 4K 비디오, 720p, CDG 등을 받아보세요\",\"duetMo
