# Cloud Build configuration for base image
# 
# This builds the base image with all Python dependencies pre-installed.
# Run this manually when poetry.lock OR Dockerfile.base changes:
#   gcloud builds submit --config=cloudbuild-base.yaml --project=nomadkaraoke
#
# The base image is used by the main Dockerfile for fast app builds.
# A combined hash of poetry.lock + Dockerfile.base is stored as a label for change detection.

steps:
  # Calculate combined hash for change detection (poetry.lock + Dockerfile.base)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Hash both files to detect changes in either
        CONTENT_HASH=$$(cat poetry.lock backend/Dockerfile.base | sha256sum | cut -d' ' -f1)
        echo "Combined content hash (poetry.lock + Dockerfile.base): $$CONTENT_HASH"
        echo "$$CONTENT_HASH" > /workspace/CONTENT_HASH

  # Build base image with all dependencies
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        CONTENT_HASH=$$(cat /workspace/CONTENT_HASH)
        docker build \
          --build-arg BUILD_DATE=$BUILD_ID \
          --build-arg BUILD_ID=$BUILD_ID \
          --build-arg BASE_CONTENT_HASH=$$CONTENT_HASH \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/karaoke-repo/karaoke-backend-base:latest \
          -t us-central1-docker.pkg.dev/$PROJECT_ID/karaoke-repo/karaoke-backend-base:$BUILD_ID \
          -f backend/Dockerfile.base \
          .

  # Push base image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/karaoke-repo/karaoke-backend-base:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/karaoke-repo/karaoke-backend-base:$BUILD_ID'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/karaoke-repo/karaoke-backend-base:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/karaoke-repo/karaoke-backend-base:$BUILD_ID'

options:
  machineType: 'N1_HIGHCPU_32'
  diskSizeGb: 100

timeout: 1800s
