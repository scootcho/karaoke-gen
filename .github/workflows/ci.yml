name: CI

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # ============================================
  # PATH FILTERING - Determine what changed
  # ============================================

  changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      package: ${{ steps.filter.outputs.package }}
      infra: ${{ steps.filter.outputs.infra }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            package:
              - 'karaoke_gen/**'
              - 'lyrics_transcriber_temp/**'
              - 'tests/**'
            infra:
              - 'infrastructure/**'
            deps:
              - 'poetry.lock'

      - name: Summary
        run: |
          echo "### Change Detection Results" >> $GITHUB_STEP_SUMMARY
          echo "| Area | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.filter.outputs.frontend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ steps.filter.outputs.backend }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ steps.filter.outputs.package }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Infrastructure | ${{ steps.filter.outputs.infra }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | ${{ steps.filter.outputs.deps }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # FRONTEND TESTS
  # ============================================

  frontend-unit-tests:
    name: "Frontend - Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run unit tests with coverage
        working-directory: frontend
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  frontend-build:
    name: "Frontend - Build"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.nomadkaraoke.com
        run: npm run build

  # ============================================
  # PACKAGE TESTS (karaoke-gen Python CLI)
  # ============================================

  package-unit-tests:
    name: "Package - Unit Tests (70% coverage)"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.package == 'true' || needs.changes.outputs.deps == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-package-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-package-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacy
          key: spacy-en_core_web_sm-${{ runner.os }}

      - name: Install spaCy language models
        run: poetry run python -m spacy download en_core_web_sm

      - name: Run unit tests
        run: |
          poetry run pytest tests/unit/ -v --cov=karaoke_gen --cov-report=xml --cov-report=term-missing --cov-fail-under=69

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  package-integration-tests:
    name: "Package - Integration Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.package == 'true' || needs.changes.outputs.deps == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-package-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-package-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache spaCy model
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacy
          key: spacy-en_core_web_sm-${{ runner.os }}

      - name: Install spaCy language models
        run: poetry run python -m spacy download en_core_web_sm

      - name: Run integration tests
        run: poetry run pytest tests/integration/ -v

  package-build:
    name: "Package - Build & Install"
    runs-on: ubuntu-latest
    needs: [changes, package-unit-tests, package-integration-tests]
    if: ${{ always() && (needs.package-unit-tests.result == 'success' || needs.package-unit-tests.result == 'skipped') && (needs.package-integration-tests.result == 'success' || needs.package-integration-tests.result == 'skipped') && (needs.changes.outputs.package == 'true' || needs.changes.outputs.deps == 'true' || github.ref == 'refs/heads/main') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-package-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-package-${{ runner.os }}-py3.13-

      - name: Build package
        run: poetry build

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          haskell: true
          dotnet: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Test package installation
        run: |
          pip install dist/*.whl
          python -m karaoke_gen.utils.gen_cli --help

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/
          retention-days: 1

  # ============================================
  # BACKEND TESTS (Cloud Run API service)
  # ============================================

  backend-unit-tests:
    name: "Backend - Unit Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.package == 'true' || needs.changes.outputs.deps == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-backend-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-backend-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: poetry install

      - name: Run all backend unit tests
        env:
          GOOGLE_CLOUD_PROJECT: test-project
          GCS_BUCKET_NAME: test-bucket
          FIRESTORE_COLLECTION: jobs
          ENVIRONMENT: test
        run: |
          poetry run pytest \
            backend/tests/ \
            --ignore=backend/tests/emulator \
            -v --tb=short

  backend-emulator-tests:
    name: "Backend - Emulator Integration Tests"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.package == 'true' || needs.changes.outputs.deps == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-backend-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-backend-${{ runner.os }}-py3.13-

      - name: Set up Java 21 (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "latest"

      - name: Install Firestore emulator
        run: gcloud components install beta cloud-firestore-emulator --quiet

      - name: Install dependencies
        run: poetry install

      - name: Start Docker for GCS emulator
        run: docker pull fsouza/fake-gcs-server:latest

      - name: Run emulator integration tests
        run: |
          chmod +x scripts/*.sh
          ./scripts/run-emulator-tests.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/htmlcov/
          retention-days: 7

  backend-lint:
    name: "Backend - Code Quality"
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.package == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-lint-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-lint-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: poetry install

      - name: Run validation (syntax check only)
        run: |
          poetry run python -m py_compile backend/main.py backend/config.py
          echo "✅ Basic syntax validation passed"

  # ============================================
  # CI GATE - Required status check for PRs
  # ============================================

  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests, frontend-build, package-unit-tests, package-integration-tests, backend-unit-tests, backend-emulator-tests, backend-lint]
    if: always()
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.frontend-unit-tests.result }}"
            "${{ needs.frontend-build.result }}"
            "${{ needs.package-unit-tests.result }}"
            "${{ needs.package-integration-tests.result }}"
            "${{ needs.backend-unit-tests.result }}"
            "${{ needs.backend-emulator-tests.result }}"
            "${{ needs.backend-lint.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ CI failed"
              exit 1
            fi
          done
          echo "✅ CI passed"

  # ============================================
  # DEPLOYMENTS (main branch only)
  # ============================================

  package-publish:
    name: "Deploy - Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [package-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Extract version
        id: extract_version
        run: |
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 Extracted version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "🏷️  Tag v$VERSION already exists, skipping release"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "✨ Tag v$VERSION does not exist, proceeding with release"
          fi

      - name: Publish to PyPI
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          echo "📦 Publishing the following files to PyPI:"
          ls -la dist/
          echo "🚀 Publishing to PyPI..."
          poetry config pypi-token.pypi ${{ secrets.PYPI_API_TOKEN }}
          poetry publish

      - name: Create Git Tag
        if: steps.check_tag.outputs.tag_exists == 'false'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a "v${{ steps.extract_version.outputs.version }}" -m "Release v${{ steps.extract_version.outputs.version }}"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} "v${{ steps.extract_version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ steps.extract_version.outputs.version }}"
          name: "v${{ steps.extract_version.outputs.version }}"
          body: |
            ## Changes in v${{ steps.extract_version.outputs.version }}

            This release was automatically created from the main branch.

            ### Installation
            ```bash
            pip install karaoke-gen==${{ steps.extract_version.outputs.version }}
            ```

            ### Assets
            - Python package published to PyPI
            - Frontend deployed to GitHub Pages at gen.nomadkaraoke.com

            For detailed changes, see the commit history.
          draft: false
          prerelease: false
          files: |
            dist/*.whl
            dist/*.tar.gz

  deploy-frontend:
    name: "Deploy - Frontend (GitHub Pages)"
    runs-on: ubuntu-latest
    needs: [frontend-unit-tests, frontend-build]
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && (needs.frontend-unit-tests.result == 'success' || needs.frontend-unit-tests.result == 'skipped') && (needs.frontend-build.result == 'success' || needs.frontend-build.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Enable Yarn (for lyrics frontend)
        run: corepack enable

      # ===== Build Main Frontend (Next.js) =====
      - name: Install main frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build main frontend (Next.js static export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.nomadkaraoke.com
        run: npm run build

      # ===== Build Lyrics Review Frontend (Vite) =====
      - name: Cache Yarn dependencies (lyrics frontend)
        uses: actions/cache@v4
        with:
          path: lyrics_transcriber_temp/lyrics_transcriber/frontend/node_modules
          key: yarn-lyrics-${{ runner.os }}-${{ hashFiles('lyrics_transcriber_temp/lyrics_transcriber/frontend/yarn.lock') }}
          restore-keys: |
            yarn-lyrics-${{ runner.os }}-

      - name: Install lyrics frontend dependencies
        working-directory: lyrics_transcriber_temp/lyrics_transcriber/frontend
        run: yarn install --frozen-lockfile

      - name: Build lyrics frontend (Vite)
        working-directory: lyrics_transcriber_temp/lyrics_transcriber/frontend
        env:
          # Set base path for subpath deployment
          VITE_BASE_PATH: /lyrics/
        run: yarn build --base=/lyrics/

      - name: Copy lyrics frontend to main output
        run: |
          mkdir -p frontend/out/lyrics
          cp -r lyrics_transcriber_temp/lyrics_transcriber/frontend/dist/* frontend/out/lyrics/

      # ===== Copy Instrumental Review UI (Static HTML) =====
      - name: Copy instrumental review UI to main output
        run: |
          mkdir -p frontend/out/instrumental
          cp karaoke_gen/instrumental_review/static/index.html frontend/out/instrumental/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "frontend/out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    name: "Deploy - Backend (Cloud Run)"
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-emulator-tests, backend-lint]
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && (needs.backend-unit-tests.result == 'success' || needs.backend-unit-tests.result == 'skipped') && (needs.backend-emulator-tests.result == 'success' || needs.backend-emulator-tests.result == 'skipped') && (needs.backend-lint.result == 'success' || needs.backend-lint.result == 'skipped') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0  # Need full history for tag check

      - name: Set up Python (for version extraction)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Extract version and check if deployment needed
        id: version_check
        run: |
          VERSION=$(poetry version --short)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📋 Current version: $VERSION"

          if git ls-remote --tags origin | grep -q "refs/tags/v$VERSION$"; then
            echo "needs_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  Tag v$VERSION already exists - skipping backend deployment"
            echo "   (Bump version in pyproject.toml to trigger a new deployment)"
          else
            echo "needs_deploy=true" >> $GITHUB_OUTPUT
            echo "✨ Tag v$VERSION does not exist - proceeding with deployment"
          fi

      - name: Authenticate to Google Cloud (Workload Identity)
        if: steps.version_check.outputs.needs_deploy == 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.version_check.outputs.needs_deploy == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "latest"

      - name: Check if base image needs rebuild
        if: steps.version_check.outputs.needs_deploy == 'true'
        id: check-base
        run: |
          echo "🔍 Checking if base image needs rebuild..."

          # Hash both poetry.lock AND Dockerfile.base - rebuild if either changes
          CURRENT_HASH=$(cat poetry.lock backend/Dockerfile.base | sha256sum | cut -d' ' -f1)
          echo "Current combined hash (poetry.lock + Dockerfile.base): $CURRENT_HASH"

          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

          BASE_IMAGE="us-central1-docker.pkg.dev/nomadkaraoke/karaoke-repo/karaoke-backend-base:latest"
          EXISTING_HASH=""

          if docker pull $BASE_IMAGE 2>/dev/null; then
            EXISTING_HASH=$(docker inspect $BASE_IMAGE --format='{{index .Config.Labels "base.content.hash"}}' 2>/dev/null || echo "")
            # Fallback to old label name for backwards compatibility
            if [ -z "$EXISTING_HASH" ]; then
              EXISTING_HASH=$(docker inspect $BASE_IMAGE --format='{{index .Config.Labels "poetry.lock.hash"}}' 2>/dev/null || echo "")
            fi
            echo "Existing base image hash: $EXISTING_HASH"
          else
            echo "⚠️ No existing base image found"
          fi

          if [ "$CURRENT_HASH" != "$EXISTING_HASH" ]; then
            echo "🔄 Base image needs rebuild (poetry.lock or Dockerfile.base changed)"
            echo "needs_rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Base image is up to date"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
          fi

      - name: Rebuild base image (if needed)
        if: steps.version_check.outputs.needs_deploy == 'true' && steps.check-base.outputs.needs_rebuild == 'true'
        run: |
          echo "🏗️ Rebuilding base image with updated dependencies..."

          BASE_BUILD_ID=$(gcloud builds submit \
            --config=cloudbuild-base.yaml \
            --project=nomadkaraoke \
            --format='value(id)' \
            --async \
            .)

          echo "Base Build ID: $BASE_BUILD_ID"
          echo "Build URL: https://console.cloud.google.com/cloud-build/builds/$BASE_BUILD_ID?project=nomadkaraoke"

          echo "Waiting for base image build to complete..."
          while true; do
            BUILD_STATUS=$(gcloud builds describe $BASE_BUILD_ID --project=nomadkaraoke --format='value(status)')
            echo "Base build status: $BUILD_STATUS"

            if [ "$BUILD_STATUS" = "SUCCESS" ]; then
              echo "✅ Base image build completed successfully"
              break
            elif [ "$BUILD_STATUS" = "FAILURE" ] || [ "$BUILD_STATUS" = "CANCELLED" ] || [ "$BUILD_STATUS" = "TIMEOUT" ]; then
              echo "❌ Base image build failed with status: $BUILD_STATUS"
              echo ""
              echo "==================== BUILD LOGS ===================="
              gcloud logging read "resource.type=build AND resource.labels.build_id=$BASE_BUILD_ID" \
                --project=nomadkaraoke \
                --format="value(textPayload)" \
                --limit=200 \
                --order=asc || echo "Failed to retrieve logs from Cloud Logging"
              echo "===================================================="
              gcloud builds log $BASE_BUILD_ID --project=nomadkaraoke 2>&1 || true
              exit 1
            fi

            sleep 30
          done

      - name: Trigger Cloud Build
        if: steps.version_check.outputs.needs_deploy == 'true'
        run: |
          echo "🚀 Triggering Cloud Build for deployment..."
          echo "Commit: ${{ github.sha }}"
          echo "Version: ${{ steps.version_check.outputs.version }}"

          BUILD_ID=$(gcloud builds submit \
            --config=cloudbuild.yaml \
            --project=nomadkaraoke \
            --format='value(id)' \
            --async \
            .)

          echo "Build ID: $BUILD_ID"
          echo "Build URL: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=nomadkaraoke"

          echo "Waiting for build to complete..."
          while true; do
            BUILD_STATUS=$(gcloud builds describe $BUILD_ID --project=nomadkaraoke --format='value(status)')
            echo "Build status: $BUILD_STATUS"

            if [ "$BUILD_STATUS" = "SUCCESS" ]; then
              echo "✅ Build completed successfully"
              break
            elif [ "$BUILD_STATUS" = "FAILURE" ] || [ "$BUILD_STATUS" = "CANCELLED" ] || [ "$BUILD_STATUS" = "TIMEOUT" ]; then
              echo "❌ Build failed with status: $BUILD_STATUS"
              echo ""
              echo "==================== BUILD LOGS ===================="
              gcloud logging read "resource.type=build AND resource.labels.build_id=$BUILD_ID" \
                --project=nomadkaraoke \
                --format="value(textPayload)" \
                --limit=200 \
                --order=asc || echo "Failed to retrieve logs from Cloud Logging"
              echo "===================================================="
              echo ""
              gcloud builds log $BUILD_ID --project=nomadkaraoke 2>&1 || true
              exit 1
            fi

            sleep 30
          done

      - name: Verify deployment and version
        if: steps.version_check.outputs.needs_deploy == 'true'
        run: |
          EXPECTED_VERSION="${{ steps.version_check.outputs.version }}"
          SERVICE_URL=$(gcloud run services describe karaoke-backend \
            --region us-central1 \
            --format 'value(status.url)')

          echo "Service URL: $SERVICE_URL"
          echo "Expected version: $EXPECTED_VERSION"

          # Wait for new revision to be ready
          echo "Waiting for new revision to be ready..."
          sleep 15

          # Basic health check
          curl -f "$SERVICE_URL/api/health" || exit 1
          echo "✅ Service is healthy"

          # Version verification with retries (Cloud Run may take time to route to new revision)
          MAX_RETRIES=6
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Checking deployed version (attempt $i/$MAX_RETRIES)..."
            DEPLOYED_VERSION=$(curl -sf "$SERVICE_URL/api/health/detailed" | jq -r '.version // empty')

            if [ "$DEPLOYED_VERSION" = "$EXPECTED_VERSION" ]; then
              echo "✅ Version verified: $DEPLOYED_VERSION"
              break
            else
              echo "⚠️  Version mismatch: deployed=$DEPLOYED_VERSION, expected=$EXPECTED_VERSION"
              if [ $i -lt $MAX_RETRIES ]; then
                echo "   Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              else
                echo "❌ Version verification failed after $MAX_RETRIES attempts"
                exit 1
              fi
            fi
          done

      - name: Summary
        if: steps.version_check.outputs.needs_deploy == 'true' && success()
        run: |
          echo "🎉 Deployment successful!"
          echo "Version: ${{ steps.version_check.outputs.version }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Run: ${{ github.run_number }}"

      - name: Skipped deployment summary
        if: steps.version_check.outputs.needs_deploy == 'false'
        run: |
          echo "⏭️  Backend deployment skipped - version ${{ steps.version_check.outputs.version }} already deployed"
          echo ""
          echo "To deploy a new version:"
          echo "  1. Update version in pyproject.toml"
          echo "  2. Commit and push to main"
