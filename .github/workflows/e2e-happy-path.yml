name: E2E Happy Path Test

# Comprehensive end-to-end test that validates the full karaoke generation journey
# using ONLY browser interactions (no API shortcuts)
#
# See docs/E2E-HAPPY-PATH-TEST-SPEC.md for full requirements

on:
  # Daily run at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'

  # Manual trigger with optional parameters
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode (slower, more screenshots)'
        required: false
        default: 'false'
        type: boolean
      browser:
        description: 'Browser to test with'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      use_test_token:
        description: 'Skip signup and use E2E_TEST_TOKEN (for iterations)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  e2e-happy-path:
    name: "Full Happy Path (Real User)"
    runs-on: ubuntu-latest
    timeout-minutes: 90  # 1.5 hours max (test itself is 60 min)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          BROWSER=${{ inputs.browser || 'chromium' }}
          npx playwright install --with-deps $BROWSER

      - name: Create test-results directory
        working-directory: frontend
        run: mkdir -p test-results

      - name: Run E2E Happy Path Test
        working-directory: frontend
        env:
          TESTMAIL_API_KEY: ${{ secrets.TESTMAIL_API_KEY }}
          TESTMAIL_NAMESPACE: ${{ secrets.TESTMAIL_NAMESPACE }}
          E2E_TEST_TOKEN: ${{ inputs.use_test_token && secrets.E2E_TEST_TOKEN || '' }}
          E2E_ADMIN_TOKEN: ${{ secrets.E2E_ADMIN_TOKEN }}
          E2E_BYPASS_KEY: ${{ secrets.E2E_BYPASS_KEY }}
          DEBUG_MODE: ${{ inputs.debug_mode || 'false' }}
        run: |
          echo "Starting E2E Happy Path Test"
          echo "Browser: ${{ inputs.browser || 'chromium' }}"
          echo "Debug mode: ${{ inputs.debug_mode || 'false' }}"
          echo "Use test token: ${{ inputs.use_test_token || 'false' }}"
          echo "Time: $(date)"
          echo ""

          # Run the real user happy path test
          npx playwright test happy-path-real-user.spec.ts \
            --config=playwright.production.config.ts \
            --project=${{ inputs.browser || 'chromium' }} \
            --reporter=list \
            --timeout=3600000 \
            2>&1 | tee test-output.log
        continue-on-error: true

      - name: Check test result
        id: test_result
        working-directory: frontend
        run: |
          if grep -q "passed" test-output.log && ! grep -q "failed" test-output.log; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "Test PASSED"
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "Test FAILED - see artifacts for details"
          fi

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-happy-path-results-${{ github.run_number }}
          path: |
            frontend/test-results/
            frontend/playwright-report/
            frontend/test-output.log
          retention-days: 30

      - name: Upload video recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-happy-path-videos-${{ github.run_number }}
          path: frontend/test-results/**/*.webm
          retention-days: 30
          if-no-files-found: ignore

      - name: Create summary
        if: always()
        run: |
          echo "## E2E Happy Path Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | ${{ inputs.browser || 'chromium' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ${{ steps.test_result.outputs.result || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f frontend/test-output.log ]; then
            echo "### Test Output (last 100 lines)" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -100 frontend/test-output.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send email notification
        if: always() && github.event_name == 'schedule'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.sendgrid.net
          server_port: 587
          username: apikey
          password: ${{ secrets.SENDGRID_API_KEY }}
          subject: "E2E Happy Path Test ${{ steps.test_result.outputs.result == 'success' && 'PASSED' || 'FAILED' }} - Run #${{ github.run_number }}"
          to: andrew@nomadkaraoke.com
          from: "Karaoke Gen CI <noreply@nomadkaraoke.com>"
          body: |
            E2E Happy Path Test Results
            ===========================

            Status: ${{ steps.test_result.outputs.result == 'success' && 'PASSED ✅' || 'FAILED ❌' }}
            Run: #${{ github.run_number }}
            Trigger: ${{ github.event_name }}
            Time: ${{ github.event.repository.updated_at }}

            View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This is an automated notification from the daily E2E happy path test.

      - name: Fail if test failed
        if: steps.test_result.outputs.result == 'failure'
        run: exit 1
